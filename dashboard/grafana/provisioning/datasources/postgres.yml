apiVersion: 1

datasources:
  - name: FuelWatch PostgreSQL
    type: postgres
    uid: fuelwatch_pg
    url: postgres:5432
    user: fuelwatch
    secureJsonData:
      password: fuelwatch_secret
    jsonData:
      database: fuelwatch
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 2
      connMaxLifetime: 14400
      postgresVersion: 1600
      timescaledb: false
    isDefault: true
    editable: false
